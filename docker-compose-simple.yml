version: '3.8'

services:
  librechat-simple:
    build:
      context: .
      dockerfile: Dockerfile-simple
    ports:
      - "3080:3080"
    environment:
      - ALL_GEMINI_API_KEYS=${ALL_GEMINI_API_KEYS}
      - PORT=3080
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s